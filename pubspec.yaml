name: lifesync
description: "LifeSync - Smart Daily Planner & Habit Tracker."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  cloud_firestore: ^6.1.3
  firebase_auth: ^6.3.0
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2
  google_sign_in: ^6.2.1
  flex_color_picker: ^3.8.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_local_notifications: ^21.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_timezone: ^5.0.2
  google_fonts: ^8.0.2
  intl: ^0.20.2
  provider: ^6.1.5+1
  shared_preferences: ^2.5.4
  timezone: ^0.11.0
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  rename: ^3.1.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/

flutter_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#1E2440"
  adaptive_icon_foreground: "assets/images/logo.png"
